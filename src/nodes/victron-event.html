<script type="text/javascript">
    RED.nodes.registerType('victron-event', {
        category: 'Victron Energy',
        color: '#f7ab3e',
        paletteLabel: "Inject Event",
        defaults: {
            name:     { value: "" },
            severity: { value: 2, required: true },
            app:      { value: "node-red", required: true }
        },
        icon: "victronenergy.svg",
        inputs: 1,
        outputs: 1,
        label: function() {
            if (this.name) return this.name;
            const severityLabels = { 0: 'Warning', 1: 'Critical', 2: 'Info' };
            const severityLabel = severityLabels[parseInt(this.severity, 10)] || 'Info';
            const app = this.app || 'node-red';
            return app + ' [' + severityLabel + ']';
        },
        oneditprepare: function() {
            if (window.__victronCommon && typeof window.__victronCommon.initializeTooltips === 'function') {
                window.__victronCommon.initializeTooltips();
            }
        }
    });
</script>

<script type="text/markdown" data-help-name="victron-event">

The _Inject Event_ node sends an event to the VRM portal Event logs tab via service `com.victronenergy.logger`, path `/EventLogging/Inject`.

## Configuration

### Severity
Select the event severity level:
- **Warning** (0): Non-critical condition worth noting - displayed with yellow status
- **Critical** (1): Serious condition requiring attention - displayed with red status
- **Info** (2): Informational event - displayed with blue status

The severity can be overridden by setting `msg.severity` in the incoming message.

### App
The name identifying the source of the event (e.g. `node-red`, `my-flow`). This can be overridden by setting `msg.app` in the incoming message.

## Usage

Send a message with the event text in `msg.payload`:

```javascript
msg.payload = "Critical switch was triggered";
return msg;
```

### Overriding Configuration

You can override the configured severity and app per message:

```javascript
msg.payload = "Flow failed: missing sensor data";
msg.severity = 1;        // Override to Critical (number)
msg.app = "my-flow";     // Override app name
return msg;
```

```javascript
msg.payload = "Flow failed: missing sensor data";
msg.severity = "critical";  // Override to Critical (string, case-insensitive)
return msg;
```

## Output

The node passes through the original message and adds a `msg.event` object:

```javascript
{
    payload: "Critical switch was triggered",
    event: {
        severity: 1,
        app: "node-red",
        message: "Critical switch was triggered"
    }
}
```

## Node Status

- **Yellow dot**: Warning event injected
- **Red dot**: Critical event injected
- **Blue dot**: Info event injected
- **Red ring**: Error occurred during injection
