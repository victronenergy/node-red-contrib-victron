<script type="text/javascript">
    RED.nodes.registerType('victron-virtual-indicator', {
        category: 'Victron Energy',
        color: '#f7ab3e',
        paletteLabel: 'Virtual Indicator',
        defaults: {
            name:          { value: '' },
            customname:    { value: '' },
            group:         { value: '' },
            indicator_type:   { value: 1, required: true },
            unit:          { value: '' },
            labels:        { value: '' },
            primary_label: { value: '' },
            range_min:     { value: '' },
            range_max:     { value: '' },
            decimals:      { value: '' },
            show_ui_input: { value: 1 }
        },
        icon: 'victronenergy.svg',
        inputs: 1,
        outputs: 1,
        label: function () {
            return this.name || this.customname || 'Virtual Indicator'
        },
        outputLabels: ['Passthrough'],
        oneditprepare: function () {
            const { initializeTooltips, renderIndicatorDocBox, renderShowInUICheckboxes } = window.__victron || {}

            function updateVisibility () {
                const type = parseInt($('#node-input-indicator_type').val())
                const hasRange = type === 2 || type === 3
                const isDiscrete = type === 0

                $('#indicator-range-rows').toggle(hasRange)
                $('#indicator-discrete-rows').toggle(isDiscrete)
                $('#indicator-unit-row').toggle(!isDiscrete)
                $('#indicator-primary-label-row').toggle(!isDiscrete)
                $('#indicator-decimals-row').toggle(!isDiscrete)

                if (typeof renderIndicatorDocBox === 'function') {
                    renderIndicatorDocBox(type)
                }
            }

            $('#node-input-indicator_type').on('change', updateVisibility)
            updateVisibility()

            if (typeof renderShowInUICheckboxes === 'function') {
                renderShowInUICheckboxes('indicator-show-ui', this.show_ui_input, 'node-input-show_ui_input')
            }

            if (typeof initializeTooltips === 'function') {
                initializeTooltips()
            }
        }
    })
</script>

<script type="text/markdown" data-help-name="victron-virtual-indicator">

The _Virtual Indicator_ node creates a virtual indicator device on the underlying `dbus`, which allows Node-RED flows to publish indicator values that appear in the switching pane on the GX device display and VRM remote console.

## Indicator Types

There are several types of indicators available:

- **Discrete**: Shows a labeled state, e.g. Off/On or Open/Closed. Configure labels as a comma-separated list.
- **Value**: Displays a numeric value with an optional unit.
- **Value with range**: Displays a numeric value with a configurable min/max range indicator.
- **Temperature**: Displays a temperature value with a range indicator.

## Configuration

- **Custom Name**: Display name shown on the GX device
- **Group**: Group multiple indicators together on the GX device display
- **Unit**: Display unit (e.g. `W`, `kWh`), or use a reserved keyword (`/Temperature`, `/Speed`, `/Volume`) to follow the GX system-wide unit setting. Not applicable to Discrete indicators.
- **Primary label**: Label shown above the value (e.g. `Power`, `Temperature`). Not applicable to Discrete indicators.
- **Labels**: For discrete indicators only - comma-separated labels for values 0, 1, 2, ... Custom strings (e.g. `off,eco,on`) and reserved GX keywords (`/off`, `/on`, `/open`, `/closed`, `/ok`, `/alarm`, `/stopped`, `/running`, `/low`, `/high`) are both supported and can be mixed freely

- **Range min/max**: For range types (Value with range, Temperature) only
- **Decimals**: Number of decimal places to display. Not applicable to Discrete indicators.
- **Show in UI**: Controls visibility on local GX display (GX device, MFD) and/or VRM remote console. Both checked = value 1 (show in all UIs), local only = 2, remote only = 4, neither = 0 (hidden).

## Setting Values

The virtual indicator accepts input messages to update the displayed value.
Send an object containing the properties you want to update as the message payload.

For example, to update a power reading:

```javascript
msg.payload = { Value: 42.5 };
return msg;
```

With an explicit status:

```javascript
msg.payload = { Value: 42.5, Status: 0 };  // Status: 0=OK, 1=Fault, 2=Battery low
return msg;
```

Full D-Bus path keys are also accepted:

```javascript
msg.payload = { 'GenericInput/0/Value': 42.5 };
return msg;
```

## Outputs

- **Output 1 (Passthrough)**: Forwards the input message unchanged

## GX Device Display

As the virtual indicator becomes available on the dbus, it will appear in the switching pane on the (remote) console and attached screen of the GX device. Settings like name and group can be configured in Node-RED or directly on the GX device. On restart of Node-RED, the configured name and group will be applied again.

The indicator types correspond to the Venus OS Generic Input API, which can be found [here](https://github.com/victronenergy/venus/wiki/dbus#switch).
