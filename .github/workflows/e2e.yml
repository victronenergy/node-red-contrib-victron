name: e2e

on:
  workflow_dispatch:
  push:
    branches:
      - feat/e2e-testcafe-vrm

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack and upload tarball
        id: pack
        run: |
          npm pack
          TARBALL=$(ls *.tgz | head -1)
          echo "Packed: ${TARBALL}"
          URL=$(curl -s --upload-file "./${TARBALL}" "https://transfer.sh/${TARBALL}")
          echo "Uploaded to: ${URL}"
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Install package on Node-RED
        env:
          VRM_API_TOKEN: ${{ secrets.VRM_API_TOKEN }}
          VRM_INSTALLATION_ID: ${{ secrets.VRM_INSTALLATION_ID }}
        run: node testcafe/setup-node-red.js --url "${{ steps.pack.outputs.url }}"

      - name: Run E2E tests
        env:
          VRM_API_TOKEN: ${{ secrets.VRM_API_TOKEN }}
          VRM_INSTALLATION_ID: ${{ secrets.VRM_INSTALLATION_ID }}
          SKIP_MQTT_VERIFICATION: 'true'
        run: npm run test:e2e
